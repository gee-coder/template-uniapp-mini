name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## 变更摘要

  $CHANGES

  ## 升级提示

  - 请检查平台配置、登录流程与请求封装是否需要同步更新
  - 如涉及多端差异，请在发布说明中明确受影响平台
categories:
  - title: "Features"
    labels:
      - "type:feature"
  - title: "Fixes"
    labels:
      - "type:bug"
  - title: "Docs"
    labels:
      - "type:docs"
  - title: "Maintenance"
    labels:
      - "type:chore"
      - "dependencies"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
exclude-labels:
  - "skip-changelog"
version-resolver:
  major:
    labels:
      - "type:breaking"
  minor:
    labels:
      - "type:feature"
  patch:
    labels:
      - "type:bug"
      - "type:docs"
      - "type:chore"
      - "dependencies"
  default: patch
autolabeler:
  - label: "type:docs"
    files:
      - "*.md"
      - ".github/**"
  - label: "area:pages"
    files:
      - "src/pages/**"
      - "src/components/**"
  - label: "area:auth"
    files:
      - "src/api/**"
      - "src/store/**"
      - "src/common/**"
  - label: "area:platform"
    files:
      - "pages.json"
      - "manifest.config.ts"
      - "src/manifest.json"
  - label: "area:infra"
    files:
      - "vite.config.ts"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
footer: |
  更多协作约定见 `COLLABORATION.md`、`MAINTAINERS.md` 与 `RELEASE.md`。
