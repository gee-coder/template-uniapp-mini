name: Feature 功能建议
description: 提出小程序模板能力、页面结构或平台支持增强建议
title: "[Feature] "
labels:
  - type:feature
  - status:needs-triage
body:
  - type: textarea
    id: target
    attributes:
      label: 背景与目标
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      placeholder: 例如登录、页面、平台兼容、构建流程等
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
